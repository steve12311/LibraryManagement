server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/ms?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true}
    username: ${DB_USERNAME:ms}
    password: ${DB_PASSWORD:}
  data:
    redis:
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      host: ${REDIS_HOST:127.0.0.1}
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
    ollama:
      base-url: http://localhost:11434
      embedding:
          model: nomic-embed-text-v2-moe
    vectorstore:
      milvus:
        client:
          username: ${MILVUS_USERNAME:root}
          password: ${MILVUS_PASSWORD:}
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
        database-name: ${MILVUS_DATABASE_NAME:default}
        collection-name: ${MILVUS_COLLECTION_NAME:book_keywords_v2}
        embedding-dimension: 768
        initialize-schema: true
        auto-id: false
        id-field-name: doc_id
        content-field-name: content
        metadata-field-name: metadata
        embedding-field-name: embedding
        index-type: IVF_FLAT
        metric-type: COSINE
        index-parameters: '{"nlist":1024}'
  cache:
    enabled: true
    type: redis
    redis:
      time-to-live: 30m
      cache-null-values: false
      use-key-prefix: true

# 验证码配置
captcha:
  # 验证码类型 circle-圆圈干扰验证码|gif-验证码|line-干扰线验证码|shear-扭曲干扰验证码
  type: circle
  # 验证码宽度
  width: 120
  # 验证码高度
  height: 40
  # 验证码干扰元素个数
  interfere-count: 2
  # 文本透明度(0.0-1.0)
  text-alpha: 0.8
  # 验证码字符配置
  code:
    # 验证码字符类型 math-算术|random-随机字符
    type: random
    # 验证码字符长度，type=算术时，表示运算位数(1:个位数运算 2:十位数运算)；type=随机字符时，表示字符个数
    length: 4
  # 验证码字体
  font:
    # 字体名称 Dialog|DialogInput|Monospaced|Serif|SansSerif
    name: SansSerif
    # 字体样式 0-普通|1-粗体|2-斜体
    weight: 1
    # 字体大小
    size: 24
  # 验证码有效期(秒)
  expire-seconds: 120

# 安全配置
security:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 1800
  session:
    type: jwt # 会话方式 jwt/redis-token
    access-token-time-to-live: 7200 # 访问令牌 有效期(单位：秒)，默认 2 小时，-1 表示永不过期
    refresh-token-time-to-live: 604800 # 刷新令牌有效期(单位：秒)，默认 7 天，-1 表示永不过期
    jwt:
      secret-key: ${JWT_SECRET_KEY:change-me-012345678901234567890123456789012345678901234567890123456789} # JWT密钥(HS256算法至少32字符)
    redis-token:
      allow-multi-login: true # 是否允许多设备登录
  # 安全白名单路径，仅跳过 AuthorizationFilter 过滤器，还是会走 Spring Security 的其他过滤器(CSRF、CORS等)
  ignore-urls:
    - /api/v1/auth/login/** # 登录接口(账号密码登录、手机验证码登录和微信登录)
    - /api/v1/auth/captcha # 验证码获取接口
    - /api/v1/auth/refresh-token # 刷新令牌接口
    - /api/v1/auth/logout # 开放退出登录
    - /api/v1/index/books/page # 公开书目分页接口
    - /api/v1/auth/wx/miniapp/code-login # 微信小程序code登陆
    - /ws/** # WebSocket接口
  # 非安全端点路径，完全绕过 Spring Security 的安全控制
  unsecured-urls:
    - /favicon.ico
  refresh-token-cookie:
    name: refreshToken
    path: /api/v1/auth/refresh-token
    http-only: true
    secure: false
    same-site: Lax

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  global-config:
    db-config:
      # 主键ID类型
      id-type: none
      # 逻辑删除对应的全局属性名（注意：须是对象属性名，不能是表字段名，如 isDeleted 而非 is_deleted，否则逻辑删除失效）
      logic-delete-field: isDeleted
      # 逻辑删除-删除值
      logic-delete-value: 1
      # 逻辑删除-未删除值
      logic-not-delete-value: 0
  configuration:
    # 驼峰下划线转换
    map-underscore-to-camel-case: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

oss:
  type: local
  local:
    storage-path: ${OSS_LOCAL_STORAGE_PATH:/tmp/oss/}

file:
  cache:
    enabled: true
    meta-ttl-seconds: 86400
    null-ttl-seconds: 60
  upload:
    max-size-bytes: 5242880
    allowed-extensions: jpg,jpeg,png,gif
    allowed-mime-types: image/jpeg,image/png,image/gif
  download:
    inline-allowed-mime-types: image/jpeg,image/png,image/gif

ai:
  catalog-vector-queue:
    stream-key: ai:catalog-vector:stream
    consumer-group: catalog-vector-group
    consumer-name-prefix: catalog-vector-consumer
    consumer-enabled: true
    max-retries: 3
    poll-timeout-seconds: 1
  catalog-vector-rebuild:
    enabled: false
    batch-size: 100
